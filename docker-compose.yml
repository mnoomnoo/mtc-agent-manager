services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - ALLOWED_ORIGINS=http://localhost
      - CONFIGS_ROOT=/configs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIGS_ROOT:-$HOME/Documents/mtc-configs}:/configs
